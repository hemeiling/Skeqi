<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:10px 14px;display:flex;align-items:center;gap:10px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:600;color:#e6edf3;white-space:nowrap}
.topbar input{padding:5px 11px;border:1px solid #30363d;border-radius:16px;background:#21262d;color:#e6edf3;font-size:14px;outline:none;width:180px}
.topbar input::placeholder{color:#484f58}
.topbar input:focus{border-color:#58a6ff}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;align-items:center}
.li{display:flex;align-items:center;gap:4px;font-size:12px;color:#8b949e}
.ld{width:11px;height:11px;border-radius:2px}
.filterbar{display:flex;flex-direction:column;gap:4px;padding:10px 8px;background:#161b22;border-right:1px solid #30363d;flex-shrink:0;overflow-y:auto;width:148px;z-index:5}
.fb{padding:5px 10px;border-radius:8px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.12s;text-align:left;width:100%}
.fb:hover{border-color:#58a6ff;color:#58a6ff;background:#21262d}
.fb.on{color:#fff;border-color:transparent}
.wrap{overflow:hidden;position:relative;cursor:grab;background:#0d1117}
.wrap.drag{cursor:grabbing}
#cv{position:absolute;top:0;left:0}
.zc{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:3px;z-index:10}
.zb{width:28px;height:28px;border-radius:7px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zb:hover{background:#21262d;border-color:#58a6ff}
.tip{position:absolute;background:#161b22;border:1px solid #58a6ff;border-radius:8px;padding:8px 11px;font-size:13px;pointer-events:none;z-index:20;max-width:260px;transform:translateY(-110%);box-shadow:0 4px 20px rgba(0,0,0,0.5)}
.tn{font-size:12px;color:#58a6ff;margin-bottom:3px}
.tm{font-weight:600;color:#e6edf3;line-height:1.3;font-size:14px}
.tz{color:#8b949e;margin-top:2px;font-size:13px}
.tc{font-size:12px;margin-top:4px;padding:2px 6px;border-radius:8px;display:inline-block}
.ti{font-size:12px;color:#8b949e;margin-top:5px;line-height:1.5;border-top:1px solid #30363d;padding-top:5px}
.info{position:absolute;top:10px;left:10px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 12px;font-size:13px;color:#8b949e;z-index:10}
.info strong{color:#e6edf3;font-size:14px;display:block;margin-bottom:4px}
.sbar{padding:6px 14px;background:#0d1117;font-size:12px;color:#484f58;display:flex;gap:12px;flex-shrink:0;border-top:1px solid #21262d;align-items:center;flex-wrap:wrap}
.sbar span span{color:#8b949e}
/* Modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:14px}
.ov.show{display:flex}
.modal{background:#161b22;border:1px solid #30363d;border-radius:12px;max-width:500px;width:100%;max-height:82vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.mh{padding:16px 18px 12px;border-bottom:1px solid #30363d;position:sticky;top:0;background:#161b22;border-radius:12px 12px 0 0}
.mn{font-size:12px;color:#58a6ff;margin-bottom:3px}
.me{font-size:18px;font-weight:600;color:#e6edf3;line-height:1.3}
.mz{font-size:14px;color:#8b949e;margin-top:2px}
.mcat{display:inline-block;font-size:12px;padding:2px 8px;border-radius:8px;margin-top:5px;color:#fff}
.mb{padding:14px 18px 18px}
.mi{font-size:14px;line-height:1.9;color:#c9d1d9}
.mt{font-size:12px;color:#484f58;margin-top:10px;padding-top:10px;border-top:1px solid #21262d}
.mc{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:50%;border:1px solid #30363d;background:#21262d;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#8b949e}
.mc:hover{background:#30363d}
/* CN panel */




.cnc:hover{background:#21262d;border-color:#30363d}







.rp-company{padding:10px 12px;border-bottom:1px solid #21262d;cursor:pointer;transition:background 0.12s}
.rp-company:hover{background:#21262d}
.rp-company.selected{background:#21262d;border-left:3px solid #58a6ff}
.rp-num{font-size:9px;color:#484f58;background:#21262d;padding:1px 5px;border-radius:3px;margin-right:5px}
.rp-name{font-size:13px;font-weight:500;color:#e6edf3}
.rp-zh{font-size:11px;color:#8b949e;margin-top:1px}
.rp-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.rp-tag{font-size:9px;padding:1px 6px;border-radius:8px;background:#21262d;color:#8b949e}
.rp-p1{border-left:3px solid #ffa657}
.rp-p2{border-left:3px solid #58a6ff}
.rp-p3{border-left:3px solid #484f58}
/* Detail card */
.det-section{padding:12px 14px;border-bottom:1px solid #21262d}
.det-label{font-size:10px;font-weight:600;color:#8b949e;text-transform:uppercase;margin-bottom:5px;letter-spacing:0.5px}
.det-text{font-size:12px;line-height:1.7;color:#c9d1d9}
.det-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin:2px 2px 2px 0}
.det-project{background:#21262d;border-radius:6px;padding:7px 10px;margin-bottom:5px;border-left:2px solid #58a6ff}
.det-project-text{font-size:12px;color:#c9d1d9;line-height:1.5}
.det-opp{background:rgba(255,166,87,0.1);border-radius:6px;padding:8px 10px;border-left:2px solid #ffa657}
.det-opp-text{font-size:12px;color:#e6edf3;line-height:1.6}
.priority-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #21262d}


#rp-search:focus{border-color:#58a6ff}
#rp-search::placeholder{color:#484f58}

:root{--bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#30363d;--tx0:#e6edf3;--tx1:#c9d1d9;--tx2:#8b949e;--tx3:#484f58;--accent:#58a6ff;--shadow:rgba(0,0,0,0.6);--modal-bg:rgba(0,0,0,0.7);--canvas-grid:rgba(255,255,255,0.03);}

.topbar{background:var(--bg1)!important;border-bottom:1px solid var(--bg3)!important;}

.sbar{background:var(--bg0)!important;border-top-color:var(--bg2)!important;color:var(--tx3)!important;}

.ov{background:var(--modal-bg)!important;}
.modal{background:var(--bg1)!important;border-color:var(--bg3)!important;box-shadow:0 8px 32px var(--shadow)!important;}
.mh{background:var(--bg1)!important;border-bottom-color:var(--bg3)!important;}
.mn{color:var(--accent)!important;}.me{color:var(--tx0)!important;}.mz{color:var(--tx2)!important;}

.mc{background:var(--bg2)!important;border-color:var(--bg3)!important;color:var(--tx2)!important;}
.mc:hover{background:var(--bg3)!important;}
.rp-company{border-bottom-color:var(--bg2)!important;}

.rp-num{background:var(--bg2)!important;color:var(--tx3)!important;}
.rp-name{color:var(--tx0)!important;}.rp-zh{color:var(--tx2)!important;}
.rp-tag{background:var(--bg2)!important;color:var(--tx2)!important;}
.det-section{border-bottom-color:var(--bg2)!important;}
.det-label{color:var(--tx2)!important;}.det-text{color:var(--tx1)!important;}
.det-project{background:var(--bg2)!important;}.det-project-text{color:var(--tx1)!important;}
.det-opp-text{color:var(--tx0)!important;}.priority-bar{border-bottom-color:var(--bg2)!important;}
#rpanel{background:var(--bg1)!important;border-left-color:var(--bg3)!important;box-shadow:-6px 0 24px var(--shadow)!important;}
#rp-header{background:var(--bg1)!important;border-bottom-color:var(--bg3)!important;}
#rp-search{background:var(--bg2)!important;border-color:var(--bg3)!important;color:var(--tx0)!important;}
#rp-search::placeholder{color:var(--tx3)!important;}
#rp-search:focus{border-color:var(--accent)!important;}
#rp-body{background:var(--bg1);}
#theme-btn{padding:4px 11px;border-radius:16px;border:1px solid var(--bg3);background:var(--bg2);color:var(--tx2);font-size:13px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
#theme-btn:hover{border-color:var(--accent);color:var(--accent);}

function isHot(b){const t=(b.nm+' '+(b.zh||'')).toLowerCase();return HOT.some(k=>t.includes(k));}
function getColor(b){

function isVis(b){

    if(!DCM[b.n]&&!ICM[b.n])return false;

  if(searchT){const t=(b.nm+' '+(b.zh||'')+' '+b.n).toLowerCase();if(!t.includes(searchT))return false;}

function resetView(){
  const xs=ALL_BOOTHS_DATA.map(b=>b.x),ys=ALL_BOOTHS_DATA.map(b=>b.y);
  const mnX=Math.min(...xs)-10,mxX=Math.max(...xs)+BW+10,mnY=Math.min(...ys)-10,mxY=Math.max(...ys)+BH+10;
  scale=Math.min(cv.width/(mxX-mnX),cv.height/(mxY-mnY))*0.88;
  ox=(cv.width-(mxX-mnX)*scale)/2-mnX*scale;
  oy=(cv.height-(mxY-mnY)*scale)/2-mnY*scale;
  draw();

function zoom(f,cx,cy){
  cx=cx??cv.width/2;cy=cy??cv.height/2;
  const ns=Math.max(0.3,Math.min(12,scale*f));
  ox=cx-(cx-ox)*(ns/scale);oy=cy-(cy-oy)*(ns/scale);scale=ns;draw();
}
function w2s(x,y){return[x*scale+ox,y*scale+oy];}
function s2w(x,y){return[(x-ox)/scale,(y-oy)/scale];}

function draw(){
  if(!ctx||!cv)return;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,cv.width,cv.height);
  // subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
  const [wx0]=s2w(0,0),[wx1]=s2w(cv.width,0);
  for(let gx=Math.floor(wx0/100)*100;gx<=wx1+100;gx+=100){const[sx]=w2s(gx,0);ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,cv.height);ctx.stroke();}
  // section labels
  if(scale>0.4){
    const sections=[{x:203,label:'Electric & Hybrid'},{x:335,label:'The Battery Show'},{x:585,label:'Battery Tech'}];
    ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.08)';
    sections.forEach(s=>{const[sx,sy]=w2s(s.x,80);ctx.font=`bold ${Math.max(11,16*scale)}px sans-serif`;ctx.fillText(s.label,sx,sy);});
  }
  const bw=BW*scale,bh=BH*scale;
  const vis=[],hid=[];
  ALL_BOOTHS_DATA.forEach(b=>isVis(b)?vis.push(b):hid.push(b));
  // hidden - very dim
  hid.forEach(b=>{
    const[sx,sy]=w2s(b.x,b.y);
    if(sx+bw<0||sx>cv.width||sy+bh<0||sy>cv.height)return;
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(sx,sy,bw,bh);
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.lineWidth=0.5;
    ctx.strokeRect(sx+0.5,sy+0.5,bw-1,bh-1);
  });
  // visible
  vis.forEach(b=>{
    const[sx,sy]=w2s(b.x,b.y);
    if(sx+bw<0||sx>cv.width||sy+bh<0||sy>cv.height)return;
    const color=getColor(b);
    const isAv=b.c==='available'||b.nm.toLowerCase().startsWith('available');
    const isH=hovered&&hovered.n===b.n;
    const isDC=DCM[b.n],isIC=ICM[b.n];
    const edge=Math.max(0.5,Math.min(1,scale*0.7));
    if(isAv){
      ctx.fillStyle=isH?'#388bfd':'rgba(88,166,255,0.22)';
      ctx.fillRect(sx,sy,bw,bh);
      ctx.strokeStyle=isH?'#79c0ff':'#58a6ff';
      ctx.lineWidth=Math.max(1,1.5*scale);
      ctx.strokeRect(sx+0.5,sy+0.5,bw-1,bh-1);
    } else if(isDC||isIC){
      const cc=isDC?'#f85149':'#f0883e';
      ctx.fillStyle=isH?cc+'99':cc+'55';
      ctx.fillRect(sx,sy,bw,bh);
      ctx.strokeStyle=cc;
      ctx.lineWidth=Math.max(1,1.5*scale);
      if(isIC)ctx.setLineDash([3,2]);
      ctx.strokeRect(sx+0.5,sy+0.5,bw-1,bh-1);
      ctx.setLineDash([]);
    } else {
      ctx.fillStyle=isH?lighten(color,0.35):(color+(isHot(b)?'dd':'99'));
      ctx.fillRect(sx,sy,bw,bh);
      ctx.strokeStyle='rgba(0,0,0,0.4)';
      ctx.lineWidth=edge;
      ctx.strokeRect(sx+edge/2,sy+edge/2,bw-edge,bh-edge);
    }
    // booth number only at extreme zoom
    if(scale>3){
      const fs=Math.min(Math.floor(bh*0.55),Math.floor(bw*0.35));
      if(fs>=3){
        ctx.save();ctx.beginPath();ctx.rect(sx+0.5,sy+0.5,bw-1,bh-1);ctx.clip();
        ctx.font=`bold ${fs}px monospace`;
        ctx.fillStyle='rgba(255,255,255,0.9)';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(b.n,sx+bw/2,sy+bh/2);ctx.restore();

      ctx.strokeRect(sx-1.5,sy-1.5,bw+3,bh+3);
    });
  }
}
function lighten(hex,a){const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,(n>>16)+Math.round(255*a));const g=Math.min(255,((n>>8)&0xff)+Math.round(255*a));const b=Math.min(255,(n&0xff)+Math.round(255*a));return`rgb(${r},${g},${b})`;}

}

let prevMx=0,prevMy=0;
function onMM(e){
  if(drag){ox=do_.x+(e.clientX-ds.x);oy=do_.y+(e.clientY-ds.y);draw();hideTip();return;}
  const b=findAt(e.offsetX,e.offsetY);
  if(b){hovered=b;showTip(b,e.offsetX,e.offsetY);cv.style.cursor='pointer';}
  else{hovered=null;hideTip();cv.style.cursor='grab';}
  if(b!==hovered||e.offsetX!==prevMx||e.offsetY!==prevMy)draw();
  prevMx=e.offsetX;prevMy=e.offsetY;
}

let ltd=0;
function onTS(e){e.preventDefault();if(e.touches.length===1){drag=true;ds={x:e.touches[0].clientX,y:e.touches[0].clientY};do_={x:ox,y:oy};}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ltd=Math.sqrt(dx*dx+dy*dy);}}
function onTM(e){e.preventDefault();if(e.touches.length===1&&drag){ox=do_.x+(e.touches[0].clientX-ds.x);oy=do_.y+(e.touches[0].clientY-ds.y);draw();}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.sqrt(dx*dx+dy*dy);const r=cv.getBoundingClientRect();const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;zoom(d/ltd,mx,my);ltd=d;}}

  document.getElementById('fb').innerHTML=CATS.map(c=>{
    const on=activeF===c.id;
    const cnt=counts[c.id]||0;
    const parts=c.label.split(' · ');

function getRPCompanies(){
  return ALL_BOOTHS_DATA.filter(b => {
    if(rpFilter === 'competitor') return DCM[b.n] || ICM[b.n];
    if(rpFilter === 'ess_ev') return ESS_EV[b.n];
    if(rpFilter === 'available') return b.c === 'available' || b.nm.toLowerCase().startsWith('available');
    return b.c === rpFilter;
  }).filter(b => b.nm && !b.nm.startsWith('Available'));
}

function renderRPList(){
  // Special render for available booths
  if(rpFilter==='available'){
    renderAvailableList();
    return;
  }
  // Special render for chinese companies
  if(rpFilter==='chinese'){
    renderChineseList();
    return;
  }
  let companies = getRPCompanies();
  // Filter by search
  if(rpSearch){
    const q = rpSearch.toLowerCase();
    companies = companies.filter(b =>
      b.nm.toLowerCase().includes(q) ||
      (b.zh||'').toLowerCase().includes(q) ||
      b.n.toLowerCase().includes(q)
    );
  }
  // Sort alphabetically by English name (primary), zh name as tiebreaker
  companies.sort((a,b) => {
    const na = (a.zh||a.nm).toLowerCase();
    const nb = (b.zh||b.nm).toLowerCase();
    // Chinese companies: sort by zh; others by nm
    const isChinese = s => /[一-鿿]/.test(s);
    const ka = isChinese(a.zh||'') ? (a.zh||a.nm) : a.nm;
    const kb = isChinese(b.zh||'') ? (b.zh||b.nm) : b.nm;
    return ka.toLowerCase().localeCompare(kb.toLowerCase(), 'zh');
  });

  const total = getRPCompanies().length;
  const showing = companies.length;
  const countText = rpSearch ? `${showing} / ${total} 家` : `${total} 家公司`;

  let html = `<div style="padding:6px 12px;font-size:11px;color:#484f58;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center">

    ${rpSearch?`<span style="color:#58a6ff;cursor:pointer" onclick="clearRPSearch()">✕ 清除</span>`:''}
  </div>`;
  
  if(companies.length === 0){
    html += `<div style="padding:24px;text-align:center;color:#484f58;font-size:13px">没有匹配的公司</div>`;
  }

    html += `<div class="rp-company ${pClass} ${isSelected?'selected':''}" onclick="showRPDetail('${b.n}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">

            ${ic?'<span class="rp-tag" style="color:#f0883e;background:rgba(240,136,62,0.1)">⚡间接竞品</span>':''}

            ${pLabel?`<span class="rp-tag" style="color:#ffa657;background:rgba(255,166,87,0.1)">${pLabel}</span>`:''}

        <span style="font-size:11px;color:#484f58;margin-left:8px;flex-shrink:0">›</span>

    'supplier':'🔧 上游供应商',
    'other':'📋 其他'
  };
  const roleColors={
    'direct_customer':'#ffa657',
    'customer':'#3fb950',
    'competitor':'#f85149',
    'supplier':'#a371f7',
    'other':'#484f58'
  };

  // Group by role, apply search filter
  const q=rpSearch.toLowerCase();
  const grouped={};
  CN_COMPANIES.forEach(c=>{
    if(q&&!c.zh.toLowerCase().includes(q)&&!c.name.toLowerCase().includes(q)&&!c.booth.includes(q))return;

  const total=CN_COMPANIES.length;

    ${q?`<span style="color:#58a6ff;cursor:pointer" onclick="clearRPSearch()">✕ 清除</span>`:''}
  </div>`;

  if(showing===0){
    html+=`<div style="padding:24px;text-align:center;color:#484f58;font-size:13px">没有匹配的公司</div>`;
  }

  roleOrder.forEach(role=>{
    const list=grouped[role];
    if(!list||!list.length)return;
    const color=roleColors[role]||'#484f58';
    html+=`<div style="padding:5px 12px;font-size:11px;font-weight:600;color:${color};background:${color}15;border-bottom:1px solid #21262d">${roleLabels[role]||role}(${list.length}）</div>`;
    list.forEach(c=>{
      const b=ALL_BOOTHS_DATA.find(x=>x.n===c.booth);
      const colorB=b?getColor(b):'#484f58';
      html+=`<div class="rp-company" style="border-left:3px solid ${color}" onclick="showRPDetail('${c.booth}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div style="flex:1">
            <div><span class="rp-num">${c.booth}</span><span class="rp-name">${c.zh}</span></div>
            <div class="rp-zh">${c.name}</div>
            <div class="rp-tags">
              <span class="rp-tag" style="background:${color}22;color:${color}">${c.industry}</span>
            </div>
          </div>
          <span style="font-size:11px;color:#484f58;margin-left:8px;flex-shrink:0">›</span>
        </div>
      </div>`;
    });
  });

  html+='<div style="padding:10px 12px;border-top:1px solid #21262d">'
    +'<button onclick="downloadCompanyList()" style="width:100%;padding:7px;border-radius:8px;border:1px solid #30363d;background:#21262d;color:#e6edf3;cursor:pointer;font-size:12px">⬇ 下载公司列表 (.csv)</button>'
    +'</div>';
  document.getElementById('rp-body').innerHTML=html;
}

function renderAvailableList() {

    return r.booth.indexOf(q) >= 0 || r.badge.toLowerCase().indexOf(q) >= 0 ||
           (r.location || '').toLowerCase().indexOf(q) >= 0;
  });
  var gradeColor = {Excellent: '#3fb950', Good: '#58a6ff', Fair: '#8b949e'};
  var h = '<div style="padding:6px 12px;font-size:11px;color:#484f58;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center">'

      + '<div style="flex:1;min-width:0">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">'

      + '</div>'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
      + '<div style="flex:1;height:4px;background:#21262d;border-radius:2px;overflow:hidden">'
      + '<div style="width:' + barW + '%;height:100%;background:' + gc + ';border-radius:2px"></div></div>'
      + '<span style="font-size:13px;font-weight:700;color:' + gc + '">' + r.score.toFixed(1) + '</span>'

function buildBoothDetail(r) {
  var gradeColor = {Excellent: '#3fb950', Good: '#58a6ff', Fair: '#8b949e'};
  var gc = gradeColor[r.grade] || '#484f58';
  var barW = Math.round(r.score * 10);

  function scoreBar(label, val) {
    var pct = Math.round(val * 10);
    var c = pct >= 80 ? '#3fb950' : pct >= 60 ? '#58a6ff' : pct >= 40 ? '#ffa657' : '#8b949e';
    return '<div style="margin-bottom:6px">'
      + '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">'
      + '<span style="color:#8b949e">' + label + '</span>'
      + '<span style="color:' + c + ';font-weight:600">' + val.toFixed(1) + '/10</span>'
      + '</div>'
      + '<div style="height:3px;background:#21262d;border-radius:2px">'
      + '<div style="width:' + pct + '%;height:100%;background:' + c + ';border-radius:2px"></div>'
      + '</div></div>';
  }

  var prosHtml = (r.pros || []).map(function(p) {
    return '<div style="font-size:11px;color:#c9d1d9;margin-bottom:3px;line-height:1.5">&bull; ' + p + '</div>';
  }).join('');
  var consHtml = (r.cons || []).map(function(c) {
    return '<div style="font-size:11px;color:#c9d1d9;margin-bottom:3px;line-height:1.5">&bull; ' + c + '</div>';
  }).join('');
  var otherBooths = AVAILABLE_RANKED.filter(function(x) {
    return x.booth !== r.booth && x.score >= 4;
  }).map(function(x) {
    var xgc = {Excellent: '#3fb950', Good: '#58a6ff', Fair: '#8b949e'}[x.grade] || '#484f58';
    return '<div onclick="showAvailableDetail(\'' + x.booth + '\')" style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;background:#0d1117;border:1px solid #21262d;margin-bottom:3px">'
      + '<span style="font-size:12px;font-weight:600;color:#e6edf3;min-width:36px">' + x.booth + '</span>'
      + '<div style="flex:1;height:3px;background:#21262d;border-radius:2px">'
      + '<div style="width:' + Math.round(x.score * 10) + '%;height:100%;background:' + xgc + ';border-radius:2px"></div></div>'
      + '<span style="font-size:12px;font-weight:700;color:' + xgc + ';min-width:28px">' + x.score.toFixed(1) + '</span>'
      + '<span style="font-size:10px;color:#484f58;text-align:right">' + x.badge + '</span>'
      + '</div>';
  }).join('');

  return '<div style="padding:14px 14px 0">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">'
    + '<div><div style="font-size:28px;font-weight:800;color:' + gc + '">' + r.score.toFixed(1)
    + '<span style="font-size:13px;color:#484f58">/10</span></div>'
    + '<div style="font-size:11px;color:' + gc + ';font-weight:600">' + r.grade + '</div></div>'
    + '<div style="flex:1"><div style="height:8px;background:#21262d;border-radius:4px;overflow:hidden;margin-bottom:5px">'
    + '<div style="width:' + barW + '%;height:100%;background:' + gc + ';border-radius:4px"></div></div>'
    + '<span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;background:' + r.badgeColor + '33;color:' + r.badgeColor + '">' + r.badge + '</span>'
    + '</div></div>'
    + '<div style="font-size:12px;color:#8b949e;margin-bottom:12px">&#9618; ' + (r.size || '') + ' &nbsp;&middot;&nbsp; &#9679; ' + (r.location || '') + '</div>'
    + '<div style="background:#0d1117;border-radius:8px;padding:12px;margin-bottom:12px">'
    + '<div style="font-size:10px;font-weight:600;color:#484f58;text-transform:uppercase;margin-bottom:8px">评分细项</div>'
    + scoreBar('&#128694; 人流量 & 交通动线', r.traffic_score || 5)
    + scoreBar('&#127970; 锚定展商质量', r.anchor_score || 5)
    + scoreBar('&#128065; 可见性 & 品牌曝光', r.visibility_score || 5)
    + scoreBar('&#127919; 思客琦相关性', r.skeqi_relevance || 5)
    + '</div>'
    + '<div style="margin-bottom:12px">'
    + '<div style="font-size:10px;font-weight:600;color:#8b949e;text-transform:uppercase;margin-bottom:5px">人流量 & 动线分析</div>'
    + '<div style="font-size:12px;color:#c9d1d9;line-height:1.7;background:#21262d;border-radius:6px;padding:9px 10px">' + (r.traffic_analysis || '') + '</div>'
    + '</div>'
    + '<div style="margin-bottom:12px">'
    + '<div style="font-size:10px;font-weight:600;color:#8b949e;text-transform:uppercase;margin-bottom:5px">周边锚定展商</div>'
    + '<div style="font-size:12px;color:#c9d1d9;line-height:1.8;background:#21262d;border-radius:6px;padding:9px 10px">' + (r.anchor_analysis || '').replace(/\n/g, '<br>') + '</div>'
    + '</div>'
    + '<div style="margin-bottom:12px">'
    + '<div style="font-size:10px;font-weight:600;color:#8b949e;text-transform:uppercase;margin-bottom:5px">可见性 & 曝光度</div>'
    + '<div style="font-size:12px;color:#c9d1d9;line-height:1.7;background:#21262d;border-radius:6px;padding:9px 10px">' + (r.visibility_analysis || '') + '</div>'
    + '</div>'
    + '<div style="margin-bottom:12px">'
    + '<div style="font-size:10px;font-weight:600;color:#8b949e;text-transform:uppercase;margin-bottom:5px">对思客琦的战略价值</div>'
    + '<div style="font-size:12px;color:#c9d1d9;line-height:1.7;background:rgba(255,166,87,0.08);border-radius:6px;padding:9px 10px;border-left:2px solid #ffa657">' + (r.relevance_analysis || r.skeqi_relevance_analysis || '') + '</div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'
    + '<div><div style="font-size:10px;font-weight:600;color:#3fb950;margin-bottom:5px;text-transform:uppercase">优势</div>' + prosHtml + '</div>'
    + '<div><div style="font-size:10px;font-weight:600;color:#f0883e;margin-bottom:5px;text-transform:uppercase">劣势</div>' + consHtml + '</div>'
    + '</div>'
    + '<div style="border-left:3px solid ' + r.badgeColor + ';padding:10px 12px;background:#21262d;border-radius:0 8px 8px 0;margin-bottom:12px">'
    + '<div style="font-size:10px;font-weight:600;color:' + r.badgeColor + ';margin-bottom:4px;text-transform:uppercase">综合建议</div>'
    + '<div style="font-size:13px;font-weight:600;color:#e6edf3;line-height:1.6">' + (r.verdict || '') + '</div>'
    + '</div>'
    + (r.expand_notes ? '<div style="font-size:11px;color:#8b949e;padding:6px 10px;background:#0d1117;border-radius:6px;margin-bottom:12px">扩展方案: ' + r.expand_notes + '</div>' : '')
    + '<button onclick="jumpTo(\'' + r.booth + '\')" style="width:100%;padding:8px;border-radius:8px;border:1px solid #30363d;background:#21262d;color:#e6edf3;cursor:pointer;font-size:12px;margin-bottom:12px">&#128506; 在地图上定位展位 ' + r.booth + '</button>'
    + '<div style="font-size:11px;color:#484f58;margin-bottom:6px">快速对比其他展位:</div>'
    + otherBooths
    + '</div>';
}

function showAvailableDetail(boothNum) {
  var r = AVAILABLE_RANKED.find(function(x) { return x.booth === boothNum; });
  if (!r) return;
  jumpTo(boothNum);
  var backBtn = '<div style="padding:8px 12px;border-bottom:1px solid #21262d">'
    + '<button onclick="renderAvailableList()" style="border:none;background:none;cursor:pointer;color:#8b949e;font-size:12px">&#8592; 返回可用展位列表</button></div>';
  document.getElementById('rp-body').innerHTML = backBtn + '<div>' + buildBoothDetail(r) + '</div>';
}

function downloadAvailableList() {
  var rows = [['展位号','综合评分','等级','推荐标签','面积','位置','人流分','锚点分','可见分','相关分','综合建议']];
  AVAILABLE_RANKED.forEach(function(r) {
    rows.push([r.booth, r.score, r.grade, r.badge, r.size || '', r.location || '',
      r.traffic_score || '', r.anchor_score || '', r.visibility_score || '', r.skeqi_relevance || '',
      (r.verdict || '').replace(/"/g, "'")]);
  });
  var csv = rows.map(function(r) {
    return r.map(function(c) { return '"' + String(c || '').replace(/"/g, '""') + '"'; }).join(',');
  }).join('\n');
  var uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
  var a = document.createElement('a');
  a.href = uri;
  a.download = 'Battery_Show_2026_Available_Booths.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function downloadCompanyList() {
  if (rpFilter === 'available') { downloadAvailableList(); return; }
  if (rpFilter === 'chinese') {
    var q = rpSearch.toLowerCase();
    var list = CN_COMPANIES.filter(function(c) {
      if (!q) return true;
      return c.zh.toLowerCase().indexOf(q) >= 0 || c.name.toLowerCase().indexOf(q) >= 0 || c.booth.indexOf(q) >= 0;
    });
    var rows = [['展位号','中文名','英文名','行业','角色']];
    list.forEach(function(c) { rows.push([c.booth, c.zh, c.name, c.industry, c.role]); });
    var csv = rows.map(function(r) {
      return r.map(function(c) { return '"' + String(c || '').replace(/"/g, '""') + '"'; }).join(',');
    }).join('\n');
    var uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
  var a = document.createElement('a');
  a.href = uri;
  a.download = 'Battery_Show_2026_Chinese_Companies.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
    return;
  }
  var companies = getRPCompanies();
  var q = rpSearch.toLowerCase();
  if (q) companies = companies.filter(function(b) {
    return b.nm.toLowerCase().indexOf(q) >= 0 || (b.zh || '').toLowerCase().indexOf(q) >= 0 || b.n.indexOf(q) >= 0;
  });
  companies.sort(function(a, b) {
    var ka = (a.zh && /[\u4e00-\u9fff]/.test(a.zh)) ? a.zh : a.nm;
    var kb = (b.zh && /[\u4e00-\u9fff]/.test(b.zh)) ? b.zh : b.nm;
    return ka.toLowerCase().localeCompare(kb.toLowerCase(), 'zh');
  });
  var catLabels = {all:'全部',competitor:'竞争对手',ess_ev:'ESS/EV项目',customer:'目标客户',
    chinese:'中国企业',line:'产线设备',mfg:'制造设备',test:'测试检测',cert:'认证机构',
    elec:'电子连接',batmat:'电池材料',recycle:'回收安全',gov:'政府',other:'其他'};
  var cat = catLabels[rpFilter] || rpFilter;
  var rows = [['展位号','英文名','中文名','类别','优先级','行业细分','公司背景','切入机会','制造地点','联系建议']];
  companies.forEach(function(b) {
    var db = COMPANY_DB[b.n] || {};
    var ev = ESS_EV[b.n] || {};
    var dc = DCM[b.n] ? '直接竞品' : '';
    var ic = ICM[b.n] ? '间接竞品' : '';
    var catLabel = dc || ic || (ev.reason ? 'ESS/EV项目' : '') || (catLabels[b.c] || b.c);
    rows.push([b.n, b.nm, b.zh || '', catLabel,
      db.priority_label || '', (db.segment || []).join('|'),
      (db.background || b.intro || '').slice(0, 200),
      (db.opportunity || ev.reason || '').slice(0, 200),
      db.locations || '', db.contacts || '']);
  });
  var csv = rows.map(function(r) {
    return r.map(function(c) { return '"' + String(c || '').replace(/"/g, '""') + '"'; }).join(',');
  }).join('\n');
  var uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
  var a = document.createElement('a');
  a.href = uri;
  a.download = 'Battery_Show_2026_' + cat + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
